name: Test Build (Signed V1+V2+V3)

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - 'media/**'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Configure debug keystore (for Gradle signing)
      run: |
        mkdir -p app/keystores
        # Use the Android default debug keystore for Gradle bundleRelease
        cp "$HOME/.android/debug.keystore" app/keystores/keystore.jks 2>/dev/null || \
          keytool -genkeypair -v \
            -keystore app/keystores/keystore.jks \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        cat <<EOF > app/keystores/keystore.properties
        storeFile=keystores/keystore.jks
        keyAlias=androiddebugkey
        storePassword=android
        keyPassword=android
        EOF

    - name: Inject credentials (empty for test build)
      run: |
        cat <<EOF > local.properties
        POSTHOG_API_KEY=placeholder
        POSTHOG_HOST=https://us.i.posthog.com
        STEAMGRIDDB_API_KEY=placeholder
        CLOUD_PROJECT_NUMBER=0
        EOF

    - name: Install Android SDK Build Tools
      run: |
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        if [ ! -x "$SDKMANAGER" ]; then
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
        fi
        yes | "$SDKMANAGER" --install "build-tools;34.0.0"

    - name: Build with Gradle
      run: ./gradlew :app:bundleRelease

    - name: Extract APK from Bundle
      run: |
        java -jar tools/bundletool-all-1.17.2.jar build-apks \
          --bundle=app/build/outputs/bundle/release/app-release.aab \
          --output=app-release.apks \
          --mode=universal
        unzip -o app-release.apks universal.apk

    - name: Sign APK (V1 + V2 + V3)
      run: |
        BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)
        ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner sign \
          --key testkey.pk8 \
          --cert testkey.x509.pem \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out universal-signed.apk \
          universal.apk
        echo "Signed: $(du -sh universal-signed.apk | cut -f1)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gamenative-test-signed
        path: universal-signed.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: test-build-${{ github.run_number }}
        name: "Test Build #${{ github.run_number }}"
        body: |
          Automated test build from commit ${{ github.sha }}

          Signed with V1 + V2 + V3 signing schemes.
        files: universal-signed.apk
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
